server {
    listen 80;
    
    # Apna domain name replace karein (e.g., verify.yourdomain.com)
    server_name YOUR_DOMAIN_HERE.com; 

    # FRONTEND: Serve main React/HTML static files directly by Nginx (Super Fast)
    location / {
        root /var/www/Email-Verifier/static;
        index index.html;
        # Agar URL path file ya folder nahi hai to automatically index.html dede
        try_files $uri $uri/ /index.html;
    }

    # BACKEND: API traffic gunicorn port 8000 waly server ko bhejein
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Long timeouts kyunke email background me time lesakti hai sometimes (vesy bulk celery pe he)
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
    }

    # ADMIN PANEL Route Match
    location /admin-panel {
        root /var/www/Email-Verifier/static;
        try_files /admin.html =404;
    }

    # API Storage & Assets proxy (for invoice generation or temporary links)
    location /api/storage/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }
}
